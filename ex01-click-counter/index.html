<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TP — Compteur de clics (10 s)</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0 auto;
      min-height: 100vh;
      max-width: 40rem;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      text-align: center;
    }

    button {
      padding: 0.4rem 0.75rem;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <h1>Mini-jeu : clics en 10 secondes</h1>
  <p>Suis les étapes dans <strong>README.md</strong> (même dossier) et complète le script ci-dessous.</p>
  <p>
    <button type="button" id="demarrer">Démarrer</button>
    <button type="button" id="clic" disabled>Clique ici !</button>
    <span>Temps : <span id="temps">10</span> s</span>
    <strong>Score : <span id="score">0</span></strong>
  </p>

  <script>
    const start = document.querySelector("#demarrer");
    const btn = document.querySelector("#clic");
    const timeEl = document.querySelector("#temps");
    const scoreEl = document.querySelector("#score");
    console.log(start, btn, timeEl, scoreEl);
    let time = 10;
    let score = 0;
    let timer = null;
    let running = false;
    start.addEventListener("click", function () {
      if (running === true) {
        console.log("Une partie est déjà en cours");
        return;
      }
      running = true;
      console.log("Partie démarrée, running =", running);
      time = 10;
      score = 0;
      timeEl.textContent = String(time);
      scoreEl.textContent = String(score);
      btn.disabled = false;
      start.disabled = true;
      timer = setInterval(function () {
        time = time - 1;
        timeEl.textContent = String(time);
        if (time === 0) {
          btn.disabled = true;
          start.disabled = false;
          running = false;
          clearInterval(timer);
        }
      }, 1000);
    });
    btn.addEventListener("click", function () {
      if (btn.disabled === true) {
        return;
      }
      score++;
      scoreEl.textContent=String(score);
    })
    /* Écris tout ton JavaScript ici en suivant les étapes du README.md (même dossier). */
  </script>
</body>

</html>
